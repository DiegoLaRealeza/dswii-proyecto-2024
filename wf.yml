================================================================================
REGLAS DE NEGOCIO APLICADAS
================================================================================

1. ISSUE ABIERTO: Existe al menos 1 componente con status_prod IN (pendiente, failure)
   - Todos los componentes son modificables (incluyendo los que tienen success)

2. ISSUE CERRADO: Todos los componentes tienen status_prod IN (success, cancelado)
   - No se permite ninguna modificacion

3. CANCELACION: Siempre se actualiza a cancelado/cancelado (ambos estados)

4. DUPLICADOS GLOBALES: Solo bloquean los componentes activos en otros issues
   - Componentes con success o cancelado en otros issues NO bloquean

5. RE-AGREGAR: Un componente cancelado puede re-agregarse creando un nuevo registro
