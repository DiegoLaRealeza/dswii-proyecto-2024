================================================================================
CRITERIOS BASICOS
================================================================================

--------------------------------------------------------------------------------
Criterio de aceptacion 1: Agregar componentes
--------------------------------------------------------------------------------

Dado que el archivo delivery.yml tiene los componentes a desplegar
Y se necesita agregar mas componentes
Cuando se actualiza el archivo delivery.yml con los nuevos componentes
Y se hace el push con los cambios
Entonces se ejecuta el workflow "DeployGo - Multicomponente - Actualizar componentes"
Y los nuevos componentes se agregan en la base de datos con estado "pendiente/pendiente"
Y en el issue de GitHub se comenta el mensaje:

    "Sincronizacion de componentes completada

    Estado anterior:
    | Organizacion | Repositorio | Orden | Estado CERT | Estado PROD |
    |--------------|-------------|-------|-------------|-------------|
    | BCP-Sandbox  | repo-A      | 1     | pendiente   | pendiente   |
    | BCP-Sandbox  | repo-B      | 2     | pendiente   | pendiente   |

    Estado actual:
    | Organizacion | Repositorio | Orden | Estado CERT | Estado PROD | Accion   |
    |--------------|-------------|-------|-------------|-------------|----------|
    | BCP-Sandbox  | repo-A      | 1     | pendiente   | pendiente   | SIN CAMBIOS |
    | BCP-Sandbox  | repo-B      | 2     | pendiente   | pendiente   | SIN CAMBIOS |
    | BCP-Sandbox  | repo-C      | 3     | pendiente   | pendiente   | AGREGADO |

    Resumen de cambios:
    Componentes agregados:
      - BCP-Sandbox/repo-C (orden: 3)"

--------------------------------------------------------------------------------
Criterio de aceptacion 2: Eliminar componentes
--------------------------------------------------------------------------------

Dado que el archivo delivery.yml contiene los componentes a desplegar
Y se necesita eliminar uno o mas componentes
Cuando se actualiza el archivo delivery.yml eliminando los componentes
Y se hace el push con los cambios
Entonces se ejecuta el workflow "DeployGo - Multicomponente - Actualizar componentes"
Y los componentes eliminados se marcan como "cancelado/cancelado" en la base de datos
Y en el issue de GitHub se comenta el mensaje:

    "Sincronizacion de componentes completada

    Estado anterior:
    | Organizacion | Repositorio | Orden | Estado CERT | Estado PROD |
    |--------------|-------------|-------|-------------|-------------|
    | BCP-Sandbox  | repo-A      | 1     | pendiente   | pendiente   |
    | BCP-Sandbox  | repo-B      | 2     | pendiente   | pendiente   |
    | BCP-Sandbox  | repo-C      | 3     | pendiente   | pendiente   |

    Estado actual:
    | Organizacion | Repositorio | Orden | Estado CERT | Estado PROD | Accion    |
    |--------------|-------------|-------|-------------|-------------|-----------|
    | BCP-Sandbox  | repo-A      | 1     | pendiente   | pendiente   | SIN CAMBIOS |
    | BCP-Sandbox  | repo-B      | 2     | pendiente   | pendiente   | SIN CAMBIOS |
    | BCP-Sandbox  | repo-C      | 3     | cancelado   | cancelado   | CANCELADO |

    Resumen de cambios:
    Componentes cancelados:
      - BCP-Sandbox/repo-C (estado anterior: pendiente/pendiente)"

--------------------------------------------------------------------------------
Criterio de aceptacion 3: Cambiar nombre de componente
--------------------------------------------------------------------------------

Dado que el archivo delivery.yml contiene los componentes a desplegar
Y se necesita cambiar el nombre de un componente existente
Cuando se actualiza el archivo delivery.yml cambiando el nombre del componente
Y se hace el push con los cambios
Entonces se ejecuta el workflow "DeployGo - Multicomponente - Actualizar componentes"
Y el componente con el nombre anterior se marca como "cancelado/cancelado" en la base de datos
Y el componente con el nuevo nombre se agrega como "pendiente/pendiente" en la base de datos
Y en el issue de GitHub se comenta el mensaje:

    "Sincronizacion de componentes completada

    Estado anterior:
    | Organizacion | Repositorio | Orden | Estado CERT | Estado PROD |
    |--------------|-------------|-------|-------------|-------------|
    | BCP-Sandbox  | repo-A      | 1     | pendiente   | pendiente   |
    | BCP-Sandbox  | repo-B      | 2     | listo       | pendiente   |

    Estado actual:
    | Organizacion | Repositorio | Orden | Estado CERT | Estado PROD | Accion    |
    |--------------|-------------|-------|-------------|-------------|-----------|
    | BCP-Sandbox  | repo-A      | 1     | pendiente   | pendiente   | SIN CAMBIOS |
    | BCP-Sandbox  | repo-C      | 2     | pendiente   | pendiente   | AGREGADO  |
    | BCP-Sandbox  | repo-B      | 2     | cancelado   | cancelado   | CANCELADO |

    Resumen de cambios:
    Componentes agregados:
      - BCP-Sandbox/repo-C (orden: 2)
    Componentes cancelados:
      - BCP-Sandbox/repo-B (estado anterior: listo/pendiente)"

--------------------------------------------------------------------------------
Criterio de aceptacion 4: Modificar orden de componentes
--------------------------------------------------------------------------------

Dado que el archivo delivery.yml contiene los componentes a desplegar
Y se necesita modificar el orden de despliegue de uno o mas componentes
Cuando se actualiza el archivo delivery.yml cambiando el valor de orden de los componentes
Y se hace el push con los cambios
Entonces se ejecuta el workflow "DeployGo - Multicomponente - Actualizar componentes"
Y el orden de los componentes se actualiza en la base de datos segun lo definido en el archivo
Y en el issue de GitHub se comenta el mensaje:

    "Sincronizacion de componentes completada

    Estado anterior:
    | Organizacion | Repositorio | Orden | Estado CERT | Estado PROD |
    |--------------|-------------|-------|-------------|-------------|
    | BCP-Sandbox  | repo-A      | 1     | pendiente   | pendiente   |
    | BCP-Sandbox  | repo-B      | 2     | listo       | pendiente   |
    | BCP-Sandbox  | repo-C      | 3     | pendiente   | pendiente   |

    Estado actual:
    | Organizacion | Repositorio | Orden | Estado CERT | Estado PROD | Accion            |
    |--------------|-------------|-------|-------------|-------------|-------------------|
    | BCP-Sandbox  | repo-A      | 2     | pendiente   | pendiente   | ORDEN ACTUALIZADO |
    | BCP-Sandbox  | repo-B      | 1     | listo       | pendiente   | ORDEN ACTUALIZADO |
    | BCP-Sandbox  | repo-C      | 3     | pendiente   | pendiente   | SIN CAMBIOS       |

    Resumen de cambios:
    Ordenes actualizados:
      - BCP-Sandbox/repo-A (orden: 1 -> 2)
      - BCP-Sandbox/repo-B (orden: 2 -> 1)"


================================================================================
CRITERIOS DE VALIDACION
================================================================================

--------------------------------------------------------------------------------
Criterio de aceptacion 5: Issue cerrado no permite modificaciones
--------------------------------------------------------------------------------

Dado que el archivo delivery.yml contiene componentes a desplegar
Y todos los componentes registrados en la base de datos tienen estado finalizado
  (todos en "listo/success" o "cancelado/cancelado" o combinacion de ambos)
Cuando se actualiza el archivo delivery.yml con cualquier cambio
Y se hace el push con los cambios
Entonces se ejecuta el workflow "DeployGo - Multicomponente - Actualizar componentes"
Y el proceso rechaza los cambios
Y en el issue de GitHub se comenta el mensaje:

    "Error: Issue Cerrado

    Este issue ya esta cerrado (todos los componentes estan en estado success o cancelado).
    No se permiten modificaciones.

    Si necesitas hacer cambios, crea un nuevo issue."

--------------------------------------------------------------------------------
Criterio de aceptacion 6: Duplicado activo en otro issue
--------------------------------------------------------------------------------

Dado que el archivo delivery.yml contiene un componente a desplegar
Y ese componente ya esta registrado en otro issue con estado activo
  (estado "pendiente" o "failure" en produccion)
Cuando se hace el push con los cambios
Entonces se ejecuta el workflow "DeployGo - Multicomponente - Actualizar componentes"
Y el proceso rechaza los cambios
Y en el issue de GitHub se comenta el mensaje:

    "Error: El repositorio 'BCP-Sandbox/repo-A' ya esta activo en otro issue
    (issue: 123, cod_app: APP001, estado: listo/pendiente)."

--------------------------------------------------------------------------------
Criterio de aceptacion 7: Sin cambios detectados
--------------------------------------------------------------------------------

Dado que el archivo delivery.yml contiene componentes a desplegar
Y el contenido del archivo coincide exactamente con los registros en la base de datos
Cuando se hace el push sin cambios reales
Entonces se ejecuta el workflow "DeployGo - Multicomponente - Actualizar componentes"
Y no se realizan cambios en la base de datos
Y en el issue de GitHub se comenta el mensaje:

    "No se detectaron cambios. El archivo delivery.yml coincide con los registros en la base de datos."


