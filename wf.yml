import psycopg2
import yaml
import os
import requests
import logging

# Configuración del logging profesional
logging.basicConfig(
    level=logging.INFO,
    format="%(asctime)s [%(levelname)s] %(message)s"
)

# Configuración de la base de datos
PGHOST = os.environ.get('PGHOST')
PGDATABASE = os.environ.get('PGDATABASE')
PGUSER = os.environ.get('BD_USERNAME')
PGPASSWORD = os.environ.get('BD_PASSWORD')
PGPORT = os.environ.get('PGPORT')
PGSSLMODE = os.environ.get('PGSSLMODE')

# Variables de entorno para el proceso
PATGH = os.environ.get('PAT_GENERIC')
GH_ISSUE_NUMBER = os.environ["GH_ISSUE_NUMBER"]
CODAPP = os.environ["CODAPP"]
REPO = os.environ["REPO"]

# ============================================================================
# CONSTANTES DE ESTADOS
# ============================================================================
# Estados CERT: pendiente, listo, cancelado
# Estados PROD: pendiente, success, failure, cancelado

ESTADOS_ACTIVOS_PROD = ('pendiente', 'failure')
ESTADOS_FINALIZADOS_PROD = ('success', 'cancelado')


def comentar_en_issue(mensaje):
    """Deja un comentario en el issue de GitHub."""
    url = f"https://api.github.com/repos/{REPO}/issues/{GH_ISSUE_NUMBER}/comments"
    headers = {
        "Authorization": f"Bearer {PATGH}",
        "Accept": "application/vnd.github+json"
    }
    data = {"body": mensaje}
    response = requests.post(url, headers=headers, json=data)
    if response.status_code == 201:
        logging.info("Comentario publicado en el issue.")
    else:
        logging.error(f"Error al comentar en el issue: {response.status_code} {response.text}")


def get_token_for_org(org):
    tokens = {
        "BCP-DevSecOps": os.environ.get("devsecops"),
        "BCP-Salesforce": os.environ.get("salesforce"),
        "BCP-Software-Engineering": os.environ.get("softwarengineering"),
        "BCP-Sandbox": os.environ.get("sandbox"),
    }
    token = tokens.get(org)
    if token:
        logging.info(f"Token encontrado para la organización: {org}")
    else:
        logging.warning(f"No se encontró token para la organización: {org}")
    return token


def get_connection_and_cursor():
    """Obtiene una conexión y cursor a la base de datos."""
    try:
        conn = psycopg2.connect(
            host=PGHOST,
            dbname=PGDATABASE,
            user=PGUSER,
            password=PGPASSWORD,
            port=PGPORT
        )
        cur = conn.cursor()
        return conn, cur
    except Exception as e:
        mensaje = f":x: Error: No se pudo conectar a la base de datos. Detalle: {e}"
        comentar_en_issue(mensaje)
        logging.error(mensaje)
        exit(1)


# ============================================================================
# REGLA 1: Verificar si el Issue está ABIERTO o CERRADO
# ============================================================================
def verificar_issue_abierto(issue_number, codapp):
    """
    Verifica si el issue está ABIERTO (tiene al menos un componente activo).
    
    ISSUE ABIERTO: Existe al menos 1 componente con status_prod IN (pendiente, failure)
    ISSUE CERRADO: TODOS los componentes tienen status_prod IN (success, cancelado)
    
    REGLA IMPORTANTE:
    - Si el issue está ABIERTO, TODOS los componentes se pueden modificar (incluso los que tienen success)
    - Si el issue está CERRADO, NO se puede modificar NADA
    
    Returns:
        tuple: (esta_abierto: bool, mensaje: str, total_componentes: int)
    """
    conn, cur = get_connection_and_cursor()
    
    # Contar componentes activos (pendiente o failure)
    cur.execute(
        """
        SELECT COUNT(*) FROM sldc_multijob 
        WHERE id_issue_gh = %s AND cod_app = %s
          AND status_deploy_cert != 'cancelado'
          AND status_deploy_prod IN %s
        """,
        (issue_number, codapp, ESTADOS_ACTIVOS_PROD)
    )
    activos = cur.fetchone()[0]
    
    # Contar total de componentes
    cur.execute(
        """
        SELECT COUNT(*) FROM sldc_multijob 
        WHERE id_issue_gh = %s AND cod_app = %s
        """,
        (issue_number, codapp)
    )
    total = cur.fetchone()[0]
    
    conn.close()
    
    # Si no hay registros, se considera abierto (nuevo issue)
    if total == 0:
        return True, "Issue nuevo, sin componentes registrados.", 0
    
    if activos > 0:
        return True, f"Issue abierto: {activos} componente(s) activo(s) de {total} total.", total
    else:
        return False, "Issue cerrado: todos los componentes están finalizados (success o cancelado).", total


# ============================================================================
# REGLA 2: Obtener componentes NO CANCELADOS de la BD (excluyendo solo cancelados)
# ============================================================================
def get_db_entries_no_cancelados(issue_number, codapp):
    """
    Obtiene los componentes NO CANCELADOS de la BD para comparar con el YAML.
    
    REGLA: Si el issue está ABIERTO, todos los componentes (incluyendo success) 
    son modificables. Solo se excluyen los cancelados.
    
    Se excluyen: cancelado/cancelado
    Se incluyen: pendiente/pendiente, listo/pendiente, listo/failure, listo/success
    """
    conn, cur = get_connection_and_cursor()
    cur.execute(
        """
        SELECT orga, reponame, orden, status_deploy_cert, status_deploy_prod 
        FROM sldc_multijob 
        WHERE id_issue_gh = %s AND cod_app = %s
          AND status_deploy_cert != 'cancelado'
        """,
        (issue_number, codapp)
    )
    results = cur.fetchall()
    conn.close()
    return [
        {
            "org": r[0], 
            "repo": r[1], 
            "orden": r[2],
            "status_cert": r[3],
            "status_prod": r[4]
        } 
        for r in results
    ]


def get_db_entries_todos(issue_number, codapp):
    """Obtiene TODOS los componentes de la BD para el issue (incluyendo finalizados)."""
    conn, cur = get_connection_and_cursor()
    cur.execute(
        """
        SELECT orga, reponame, orden, status_deploy_cert, status_deploy_prod 
        FROM sldc_multijob 
        WHERE id_issue_gh = %s AND cod_app = %s
        """,
        (issue_number, codapp)
    )
    results = cur.fetchall()
    conn.close()
    return [
        {
            "org": r[0], 
            "repo": r[1], 
            "orden": r[2],
            "status_cert": r[3],
            "status_prod": r[4]
        } 
        for r in results
    ]


def get_yml_entries(yml_path):
    """Lee el archivo delivery.yml y extrae los componentes y su orden."""
    try:
        with open(yml_path, "r") as f:
            data = yaml.safe_load(f)
    except yaml.YAMLError as e:
        mensaje = (
            f":x: Error: El archivo delivery.yml tiene un formato inválido. "
            "Esto puede deberse a problemas de indentación (espacios o tabs incorrectos) o errores de sintaxis. "
            f"Detalle: {e}"
        )
        comentar_en_issue(mensaje)
        logging.error(mensaje)
        exit(1)
    except Exception as e:
        mensaje = f":x: Error: No se pudo leer el archivo delivery.yml. Detalle: {e}"
        comentar_en_issue(mensaje)
        logging.error(mensaje)
        exit(1)

    validar_estructura_yml(data)

    entries = []
    for repo in data.get("repos", []):
        url = repo.get("name", "")
        parts = url.split("/")
        if len(parts) >= 5:
            org = parts[3]
            repo_name = parts[4]
            orden = None
            for param in repo.get("params", []):
                if "orden" in param:
                    orden = param["orden"]
            wait = repo.get("wait", None)
            entries.append({"org": org, "repo": repo_name, "orden": orden, "wait": wait})
    return entries


# ============================================================================
# REGLA 3: Comparar componentes (excluyendo solo cancelados)
# ============================================================================
def comparar_componentes(db_entries_no_cancelados, yml_entries):
    """
    Compara los componentes NO CANCELADOS de la BD con el YAML.
    
    REGLA: Si el issue está ABIERTO, todos los componentes son comparables
    (incluyendo los que tienen success). Solo se excluyen los cancelados.
    """
    db_dict = {(e["org"], e["repo"]): e for e in db_entries_no_cancelados}
    yml_dict = {(e["org"], e["repo"]): e["orden"] for e in yml_entries}

    to_add = []
    to_remove = []
    to_update_order = []

    # Detectar agregados y cambios de orden
    for key, orden in yml_dict.items():
        if key not in db_dict:
            # Componente nuevo (no existe en BD)
            to_add.append({"org": key[0], "repo": key[1], "orden": orden})
        else:
            # Existe en BD, verificar si cambió el orden
            db_entry = db_dict[key]
            if int(db_entry["orden"]) != int(orden):
                to_update_order.append({
                    "org": key[0],
                    "repo": key[1],
                    "orden_nueva": int(orden),
                    "orden_actual": int(db_entry["orden"]),
                    "status_cert": db_entry["status_cert"],
                    "status_prod": db_entry["status_prod"]
                })

    # Detectar eliminados (están en BD pero no en YAML)
    for key, entry in db_dict.items():
        if key not in yml_dict:
            to_remove.append({
                "org": key[0], 
                "repo": key[1], 
                "orden": entry["orden"],
                "status_cert": entry["status_cert"],
                "status_prod": entry["status_prod"]
            })

    return to_add, to_remove, to_update_order


# ============================================================================
# REGLA 4: Agregar registros (siempre como pendiente/pendiente)
# ============================================================================
def agregar_registros(entries, issue_number, codapp):
    """
    Agrega nuevos componentes a la base de datos.
    Siempre se insertan con status pendiente/pendiente.
    """
    if not entries:
        return
    conn, cur = get_connection_and_cursor()
    for entry in entries:
        cur.execute(
            """
            INSERT INTO sldc_multijob (id_issue_gh, ocd_key, orga, reponame, tag, orden, status_deploy_cert, status_deploy_prod, cod_app)
            VALUES (%s, %s, %s, %s, %s, %s, %s, %s, %s)
            """,
            (
                issue_number,
                '',  # ocd_key por defecto
                entry["org"],
                entry["repo"],
                '',  # tag por defecto
                entry["orden"],
                'pendiente',
                'pendiente',
                codapp
            )
        )
        logging.info(f"Insertado: {entry['org']}/{entry['repo']} con orden {entry['orden']}")
    conn.commit()
    conn.close()


# ============================================================================
# REGLA 5: Actualizar orden (cualquier componente no cancelado)
# ============================================================================
def actualizar_orden(entries, issue_number, codapp):
    """
    Actualiza el orden de los componentes existentes en la base de datos.
    
    REGLA: Si el issue está ABIERTO, se puede actualizar el orden de CUALQUIER
    componente (incluyendo los que tienen success).
    """
    if not entries:
        return
    conn, cur = get_connection_and_cursor()
    for entry in entries:
        cur.execute(
            """
            UPDATE sldc_multijob
            SET orden = %s
            WHERE id_issue_gh = %s AND cod_app = %s AND orga = %s AND reponame = %s
              AND status_deploy_cert != 'cancelado'
            """,
            (entry["orden_nueva"], issue_number, codapp, entry["org"], entry["repo"])
        )
        logging.info(f"Orden actualizado: {entry['org']}/{entry['repo']} de {entry['orden_actual']} a {entry['orden_nueva']}")
    conn.commit()
    conn.close()


# ============================================================================
# REGLA 6: Cancelar componentes (siempre cancelado/cancelado)
# ============================================================================
def cancelar_componentes(entries, issue_number, codapp):
    """
    Realiza la cancelación de componentes en la base de datos.
    
    REGLA: Si el issue está ABIERTO, CUALQUIER componente se puede cancelar
    (incluyendo los que tienen success). Siempre se actualizan AMBOS estados
    a cancelado/cancelado.
    """
    if not entries:
        return
    conn, cur = get_connection_and_cursor()
    for entry in entries:
        cur.execute(
            """
            UPDATE sldc_multijob
            SET status_deploy_cert = 'cancelado', status_deploy_prod = 'cancelado'
            WHERE id_issue_gh = %s AND cod_app = %s AND orga = %s AND reponame = %s
              AND status_deploy_cert != 'cancelado'
            """,
            (issue_number, codapp, entry["org"], entry["repo"])
        )
        logging.info(f"Cancelado: {entry['org']}/{entry['repo']} (estado anterior: {entry['status_cert']}/{entry['status_prod']})")
    conn.commit()
    conn.close()


# ============================================================================
# VALIDACIONES
# ============================================================================
def validar_orden(entries):
    """Valida que los órdenes sean enteros positivos y correlativos desde 1."""
    ordenes = [e["orden"] for e in entries]
    if not all(isinstance(o, int) and o > 0 for o in ordenes):
        mensaje = ":x: Error: Todos los valores de 'orden' deben ser enteros positivos."
        comentar_en_issue(mensaje)
        logging.error(mensaje)
        exit(1)
    ordenes_sorted = sorted(ordenes)
    if ordenes_sorted != list(range(1, len(ordenes_sorted) + 1)):
        mensaje = ":x: Error: Los valores de 'orden' deben ser correlativos y comenzar desde 1."
        comentar_en_issue(mensaje)
        logging.error(mensaje)
        exit(1)


def validar_estructura_yml(data):
    """Valida la estructura del archivo delivery.yml."""
    if "repos" not in data or not isinstance(data["repos"], list):
        mensaje = ":x: Error: El archivo delivery.yml no cumple con el formato esperado. Falta la clave 'repos' o no es una lista."
        comentar_en_issue(mensaje)
        logging.error(mensaje)
        exit(1)
    for idx, repo in enumerate(data["repos"], 1):
        if "name" not in repo:
            mensaje = f":x: Error: El archivo delivery.yml no cumple con el formato esperado. Falta el campo 'name' en el repositorio #{idx}."
            comentar_en_issue(mensaje)
            logging.error(mensaje)
            exit(1)
        if "params" not in repo or not isinstance(repo["params"], list):
            mensaje = f":x: Error: El archivo delivery.yml no cumple con el formato esperado. Falta la lista 'params' en el repositorio #{idx} ({repo.get('name','sin nombre')})."
            comentar_en_issue(mensaje)
            logging.error(mensaje)
            exit(1)
        if "wait" not in repo:
            mensaje = (
                f":x: Error: El archivo delivery.yml no cumple con el formato esperado. Falta el campo 'wait' en el repositorio #{idx} ({repo['name']}). "
                "Si el campo existe pero no es detectado, revisa la indentación y asegúrate de no usar tabs o espacios incorrectos."
            )
            comentar_en_issue(mensaje)
            logging.error(mensaje)
            exit(1)
        orden_encontrado = False
        for param in repo["params"]:
            if "orden" in param:
                orden_encontrado = True
        if not orden_encontrado:
            mensaje = f":x: Error: El archivo delivery.yml no cumple con el formato esperado. Falta el campo 'orden' en 'params' del repositorio #{idx} ({repo['name']})."
            comentar_en_issue(mensaje)
            logging.error(mensaje)
            exit(1)


def validar_existencia_repos(yml_entries):
    """Valida que los repositorios existan en GitHub."""
    for entry in yml_entries:
        org = entry["org"]
        repo = entry["repo"]
        token = get_token_for_org(org)
        if not token:
            mensaje = f":x: No se encontró token para la organización '{org}'. No se puede validar la existencia del repositorio '{org}/{repo}'."
            comentar_en_issue(mensaje)
            logging.error(mensaje)
            exit(1)
        url = f"https://api.github.com/repos/{org}/{repo}"
        headers = {"Authorization": f"Bearer {token}"}
        response = requests.get(url, headers=headers)
        if response.status_code != 200:
            mensaje = f":x: El repositorio '{org}/{repo}' no existe o no es accesible en GitHub (status {response.status_code})."
            comentar_en_issue(mensaje)
            logging.error(mensaje)
            exit(1)
        logging.info(f"Repositorio validado: {org}/{repo}")


def validar_duplicados_yaml(yml_entries):
    """Valida que no haya repositorios duplicados en el YAML."""
    vistos = set()
    for entry in yml_entries:
        clave = (entry["org"], entry["repo"])
        if clave in vistos:
            mensaje = f":x: El repositorio '{entry['org']}/{entry['repo']}' está duplicado en el archivo delivery.yml."
            comentar_en_issue(mensaje)
            logging.error(mensaje)
            exit(1)
        vistos.add(clave)
    logging.info("No se encontraron duplicados en el YAML.")


# ============================================================================
# REGLA 7: Validar duplicados globales (solo componentes ACTIVOS en otros issues)
# ============================================================================
def validar_duplicados_globales(yml_entries, issue_number, codapp):
    """
    Valida que los repositorios no estén ACTIVOS en otro issue.
    
    Estados ACTIVOS que bloquean: pendiente/pendiente, listo/pendiente, listo/failure
    Estados que NO bloquean: listo/success, cancelado/cancelado
    """
    conn, cur = get_connection_and_cursor()
    for entry in yml_entries:
        cur.execute(
            """
            SELECT id_issue_gh, cod_app, status_deploy_cert, status_deploy_prod 
            FROM sldc_multijob
            WHERE orga = %s AND reponame = %s
              AND status_deploy_cert != 'cancelado'
              AND status_deploy_prod IN %s
              AND NOT (id_issue_gh = %s AND cod_app = %s)
            """,
            (entry["org"], entry["repo"], ESTADOS_ACTIVOS_PROD, issue_number, codapp)
        )
        result = cur.fetchone()
        if result:
            estado_info = f"{result[2]}/{result[3]}"
            mensaje = (
                f":x: El repositorio '{entry['org']}/{entry['repo']}' ya está activo en otro issue "
                f"(issue: {result[0]}, cod_app: {result[1]}, estado: {estado_info}). "
                "No se permiten duplicados globales en estado activo."
            )
            comentar_en_issue(mensaje)
            logging.error(mensaje)
            conn.close()
            exit(1)
    conn.close()
    logging.info("No se encontraron duplicados globales activos en la base de datos.")


# ============================================================================
# FUNCIÓN PRINCIPAL
# ============================================================================
def main():
    logging.info("=" * 60)
    logging.info("INICIO DE SINCRONIZACIÓN DE COMPONENTES")
    logging.info("=" * 60)
    logging.info(f"Issue: {GH_ISSUE_NUMBER}, CodApp: {CODAPP}")
    
    # PASO 1: Verificar si el issue está abierto
    issue_abierto, mensaje_estado, total_componentes = verificar_issue_abierto(GH_ISSUE_NUMBER, CODAPP)
    logging.info(mensaje_estado)
    
    # Leer el YAML
    yml_entries = get_yml_entries("deployGo/delivery.yml")
    logging.info(f"Componentes en YAML: {len(yml_entries)}")
    
    # Si el issue está CERRADO y hay componentes, rechazar cualquier cambio
    if not issue_abierto and total_componentes > 0:
        mensaje = (
            ":x: **Issue Cerrado**\n\n"
            "Este issue ya está cerrado (todos los componentes están en estado `success` o `cancelado`).\n"
            "No se permiten modificaciones (agregar, eliminar o cambiar orden).\n\n"
            "Si necesitas hacer cambios, crea un nuevo issue."
        )
        comentar_en_issue(mensaje)
        logging.error("Issue cerrado. No se permiten modificaciones.")
        exit(1)
    
    # PASO 2: Validaciones del YAML
    validar_duplicados_yaml(yml_entries)
    validar_orden(yml_entries)
    
    # PASO 3: Validar duplicados globales
    validar_duplicados_globales(yml_entries, GH_ISSUE_NUMBER, CODAPP)
    
    # PASO 4: Validar existencia de repositorios en GitHub
    validar_existencia_repos(yml_entries)
    
    # PASO 5: Obtener componentes NO CANCELADOS de la BD
    db_entries_no_cancelados = get_db_entries_no_cancelados(GH_ISSUE_NUMBER, CODAPP)
    logging.info(f"Componentes no cancelados en BD: {len(db_entries_no_cancelados)}")
    
    # PASO 6: Comparar YAML vs BD (excluyendo solo cancelados)
    to_add, to_remove, to_update_order = comparar_componentes(db_entries_no_cancelados, yml_entries)

    logging.info("-" * 40)
    logging.info(f"Para agregar: {len(to_add)} componente(s)")
    logging.info(f"Para cancelar: {len(to_remove)} componente(s)")
    logging.info(f"Para actualizar orden: {len(to_update_order)} componente(s)")
    logging.info("-" * 40)

    # PASO 7: Ejecutar acciones
    resumen = []
    
    if to_add:
        agregar_registros(to_add, GH_ISSUE_NUMBER, CODAPP)
        logging.info("Registros agregados correctamente.")
        repos_agregados = [f"`{e['org']}/{e['repo']}` (orden: {e['orden']})" for e in to_add]
        resumen.append(f"**➕ Componentes agregados ({len(to_add)}):**\n" + "\n".join(f"  - {r}" for r in repos_agregados))

    if to_update_order:
        actualizar_orden(to_update_order, GH_ISSUE_NUMBER, CODAPP)
        logging.info("Órdenes actualizados correctamente.")
        repos_orden = [f"`{e['org']}/{e['repo']}` (orden: {e['orden_actual']} → {e['orden_nueva']})" for e in to_update_order]
        resumen.append(f"**🔄 Órdenes actualizados ({len(to_update_order)}):**\n" + "\n".join(f"  - {r}" for r in repos_orden))

    if to_remove:
        cancelar_componentes(to_remove, GH_ISSUE_NUMBER, CODAPP)
        logging.info("Componentes cancelados correctamente.")
        repos_cancelados = [f"`{e['org']}/{e['repo']}` (estado anterior: {e['status_cert']}/{e['status_prod']})" for e in to_remove]
        resumen.append(f"**❌ Componentes cancelados ({len(to_remove)}):**\n" + "\n".join(f"  - {r}" for r in repos_cancelados))

    # PASO 8: Comentar resumen en el issue
    if resumen:
        mensaje_resumen = ":white_check_mark: **Sincronización completada**\n\n" + "\n\n".join(resumen)
        comentar_en_issue(mensaje_resumen)
    else:
        logging.info("No se detectaron cambios. El YAML coincide con la BD.")
        comentar_en_issue(":information_source: No se detectaron cambios. El archivo `delivery.yml` coincide con los registros activos en la base de datos.")

    logging.info("=" * 60)
    logging.info("SINCRONIZACIÓN FINALIZADA")
    logging.info("=" * 60)


if __name__ == "__main__":
    main()
